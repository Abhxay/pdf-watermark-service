services:

  app:
    build: .
    container_name: pdf-watermark-app
    ports:
      - "8080:8080"
    environment:
      AWS_ENDPOINT: http://ministack:4566
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_KEY: test
      S3_BUCKET: pdf-watermark-bucket
    depends_on:
      - ministack
    restart: on-failure

  ministack:
    image: ministackorg/ministack
    container_name: pdf-watermark-ministack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3

volumes:
  ministack-data: