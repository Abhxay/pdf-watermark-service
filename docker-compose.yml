version: '3.8'

services:

  # Your Spring Boot application
    app:
        build: .
            container_name: pdf-watermark-app
                ports:
                      - "8080:8080"
                          environment:
                                AWS_ENDPOINT: http://localstack:4566
                                      AWS_REGION: us-east-1
                                            AWS_ACCESS_KEY_ID: test
                                                  AWS_SECRET_KEY: test
                                                        S3_BUCKET: pdf-watermark-bucket
                                                            depends_on:
                                                                  localstack:
                                                                          condition: service_healthy
                                                                              restart: on-failure

                                                                                # LocalStack - simulates AWS S3 locally inside Docker
                                                                                  # Version 3.8 is the last stable FREE community edition
                                                                                    # 'latest' now requires a paid license - always pin to 3.8
                                                                                      localstack:
                                                                                          image: localstack/localstack:3.8
                                                                                              container_name: pdf-watermark-localstack
                                                                                                  ports:
                                                                                                        - "4566:4566"
                                                                                                            environment:
                                                                                                                  SERVICES: s3
                                                                                                                        DEFAULT_REGION: us-east-1
                                                                                                                              DEBUG: 0
                                                                                                                                  volumes:
                                                                                                                                        - "./localstack/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh"
                                                                                                                                              - localstack-data:/var/lib/localstack
                                                                                                                                                  healthcheck:
                                                                                                                                                        test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
                                                                                                                                                              interval: 10s
                                                                                                                                                                    timeout: 5s
                                                                                                                                                                          retries: 10
                                                                                                                                                                                start_period: 20s
                                                                                                                                                                                
                                                                                                                                                                                volumes:
                                                                                                                                                                                  localstack-data:
