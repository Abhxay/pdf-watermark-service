services:

  app:
    build: .
    container_name: pdf-watermark-app
    ports:
      - "8080:8080"
    environment:
      AWS_ENDPOINT: http://ministack:4566
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_KEY: test
      S3_BUCKET: pdf-watermark-bucket
    depends_on:
      ministack:
        condition: service_healthy
    restart: on-failure

  ministack:
    image: ministackorg/ministack
    container_name: pdf-watermark-ministack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
    volumes:
      - ministack-data:/var/lib/ministack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_ministack/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  ministack-data: