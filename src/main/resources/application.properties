spring.application.name=pdf-watermark-service
server.port=8080

#  File upload limits
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

#  AWS / MiniStack  configuration
# When running via Docker Compose, 'MiniStack ' resolves to the MiniStack  container.
# When running locally without Docker, change this to http://localhost:4566
aws.endpoint=${AWS_ENDPOINT:http://ministack :4566}
aws.region=${AWS_REGION:us-east-1}
aws.access-key-id=${AWS_ACCESS_KEY_ID:test}
aws.secret-key=${AWS_SECRET_KEY:test}
aws.s3.bucket=${S3_BUCKET:pdf-watermark-bucket}

# Logging
logging.level.com.geminid=INFO
logging.level.org.apache.pdfbox=WARN
logging.level.software.amazon.awssdk=WARN
